<section class="hero section-soft">
  <div class="container hero-grid">
    <div class="hero-copy reveal">
      <span class="eyebrow">{{ t.home.hero.eyebrow }}</span>
      <h1>{{ t.home.hero.title }}</h1>
      <p>{{ t.home.hero.text }}</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="{{ url_for('localized_page', lang=lang, page_name='donate') }}">{{ t.actions.donate }}</a>
        <a class="btn btn-secondary" href="{{ url_for('localized_page', lang=lang, page_name='volunteer') }}">{{ t.actions.volunteer }}</a>
      </div>
    </div>
    <div class="hero-media reveal">
      <img src="{{ url_for('static', filename='images/' ~ t.home.hero.image) }}" alt="{{ t.home.hero.alt }}" fetchpriority="high">
      <div class="hero-badge">
        <i class="fa-solid fa-hand-holding-heart" aria-hidden="true"></i>
        <span>{{ t.home.hero.badge }}</span>
      </div>
      {% include "components/stats.html" %}
    </div>
  </div>
</section>
