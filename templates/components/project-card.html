<article class="card project-card reveal">
  <a class="card-image" href="{{ url_for('localized_page', lang=lang, page_name='projects') }}">
    <img src="{{ url_for('static', filename='images/' ~ project.image) }}" alt="{{ project.alt }}" loading="lazy">
  </a>
  <div class="card-body">
    <span class="badge">{{ project.category }}</span>
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>
    <a class="text-link" href="{{ url_for('localized_page', lang=lang, page_name='projects') }}">{{ t.actions.read_more }} <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></a>
  </div>
</article>
