{% extends "layout/base.html" %}

{% block content %}
  <section class="page-hero">
    <div class="container narrow reveal">
      <span class="eyebrow">{{ t.nav.volunteer }}</span>
      <h1>{{ t.volunteer.title }}</h1>
      <p>{{ t.volunteer.intro }}</p>
    </div>
  </section>

  <section class="section">
    <div class="container form-layout">
      <aside class="contact-panel reveal">
        <h2>{{ "Useful volunteer skills" if lang == "en" else "کارآمد رضاکارانہ مہارتیں" }}</h2>
        <p>{{ t.volunteer.skills }}</p>
        <div class="contact-line">
          <i class="fa-solid fa-phone" aria-hidden="true"></i>
          <a href="tel:+923005293396">{{ t.contact.phone }}</a>
        </div>
      </aside>
      <form class="form-card reveal" method="post">
        <div class="form-row">
          <label for="name">{{ t.forms.name }}</label>
          <input id="name" name="name" type="text" required>
        </div>
        <div class="form-row">
          <label for="email">{{ t.forms.email }}</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="form-row">
          <label for="phone">{{ t.forms.phone }}</label>
          <input id="phone" name="phone" type="tel" required>
        </div>
        <div class="form-row">
          <label for="city">{{ t.forms.city }}</label>
          <input id="city" name="city" type="text" required>
        </div>
        <div class="form-row">
          <label for="skills">{{ t.forms.skills }}</label>
          <textarea id="skills" name="skills" rows="4" required></textarea>
        </div>
        <div class="form-row">
          <label for="availability">{{ t.forms.availability }}</label>
          <input id="availability" name="availability" type="text" required>
        </div>
        <button class="btn btn-primary" type="submit">{{ t.actions.submit }}</button>
      </form>
    </div>
  </section>
{% endblock %}
